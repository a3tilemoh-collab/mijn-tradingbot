name: Handmatige Bot Builder

on:
  workflow_dispatch:
    inputs:
      bot_version:
        description: 'Versie van de bot (bijv. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code ophalen
      uses: actions/checkout@v4

    - name: Python instellen
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Afhankelijkheden installeren
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Bot inpakken voor release
      run: |
        zip -r tradingbot-v${{ github.event.inputs.bot_version }}.zip . -x "*.git*"

    - name: Sla het eindproduct op
      uses: actions/upload-artifact@v4
      with:
        name: tradingbot-v${{ github.event.inputs.bot_version }}
        path: tradingbot-v${{ github.event.inputs.bot_version }}.zip
