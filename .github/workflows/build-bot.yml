name: Handmatige Bot Builder (Op MSI Laptop)

on:
  workflow_dispatch:
    inputs:
      bot_version:
        description: 'Versie van de bot (bijv. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    # Dit zorgt ervoor dat de opdracht op JOUW laptop wordt uitgevoerd:
    runs-on: self-hosted 

    steps:
    - name: Code ophalen
      uses: actions/checkout@v4

    - name: Map aanmaken voor de bot
      run: |
        mkdir -Force "C:\MijnTradingBot"
        xcopy . "C:\MijnTradingBot" /E /H /Y
